<!DOCTYPE html>
<html>
<head>
    <style>
        html { scroll-behavior: smooth; }
        body { margin: 0; font-family: Arial; }
        nav { position: fixed; top: 0; left: 0; right: 0; background: #000; padding: 10px; z-index: 100; }
        nav a { color: white; margin: 0 15px; text-decoration: none; }
        section { min-height: 100vh; padding: 80px 20px 20px; scroll-margin-top: 50px; }
        #home { background: #f0f0f0; }
        #about { background: #e0e0e0; }
        #contact { background: #d0d0d0; }
    </style>
</head>
<body>
    <nav>
        <a href="#home">Home</a>
        <a href="#about">About</a>
        <a href="#contact">Contact</a>
    </nav>
    <section id="home">
        <h1>Home Section</h1>
        <p>Scroll down or click navigation to see smooth scrolling</p>
    </section>
    <section id="about">
        <h1>About Section</h1>
        <p>This is the about section</p>
    </section>
    <section id="contact">
        <h1>Contact Section</h1>
        <p>This is the contact section</p>
    </section>
</body>
</html>
